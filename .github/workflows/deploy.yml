name: Deploy

on:
  push:
    tags:
    - '*'

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5
    - name: Import GPG Key
      env:
        GPG_KEY_PRIVATE: ${{ secrets.GPG_KEY_PRIVATE }}
      run: |
        echo "$GPG_KEY_PRIVATE" | gpg --import --batch &> /dev/null
        echo "[ OK ] GPG Key imported."
    - name: Deploy & Release
      env:
        SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        GPG_KEY_PASSWORD_SECRET: ${{ secrets.GPG_KEY_PASSWORD_SECRET }}
        GITHUB_PACKAGES_USERNAME: ${{ github.actor }}
        GITHUB_PACKAGES_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      run: |
        ./gradlew publish
        ./gradlew closeAndReleaseStagingRepositories
